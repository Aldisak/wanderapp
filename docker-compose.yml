services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: wandermeet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wandermeet
      POSTGRES_USER: wandermeet
      POSTGRES_PASSWORD: wandermeet
    ports:
      - "5432:5432"
    volumes:
      - wandermeet-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wandermeet -d wandermeet"]
      interval: 5s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: wandermeet-azurite
    restart: unless-stopped
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --location /data --skipApiVersionCheck"
    ports:
      - "10000:10000"
    volumes:
      - wandermeet-azurite:/data

volumes:
  wandermeet-pgdata:
  wandermeet-azurite:
